<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>클럽하와이 — 월간 콘텐츠 캘린더</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Pretendard:wght@400;500;700;900&family=Archivo+Black&family=Archivo:wght@400;700;900&family=Cormorant+Garamond:ital,wght@1,500;1,700&display=swap" rel="stylesheet">
<style>
  :root {
    /* 클럽하와이 시그니처 컬러 — 트로피컬 선셋 코랄 */
    --bg: #FF5A36;
    --bg-deep: #E0381A;
    --cell: #FFFFFF;
    --ink: #161616;
    --soft: #6B6B6B;
    --outside: rgba(255,255,255,0.45);

    /* 카테고리 컬러 */
    --c-han: #2ECC71;
    --c-pro: #8E44AD;
    --c-event: #F39C12;
    --c-back: #3498DB;
    --c-grade: #F1C40F;
    --c-yoomini: #E91E63;
    --c-notice: #5DADE2;
    --c-off: #2C3E50;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    font-family: 'Pretendard', -apple-system, sans-serif;
    color: var(--ink);
    min-height: 100vh;
    padding: 40px 48px 56px;
    position: relative;
    overflow-x: auto;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle at 50% 50%, transparent 60%, rgba(0,0,0,0.06) 100%);
    pointer-events: none;
    mix-blend-mode: multiply;
  }

  .frame {
    max-width: 1400px;
    margin: 0 auto;
    position: relative;
  }

  /* ───────── 헤더 ───────── */
  .header {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: end;
    margin-bottom: 18px;
    gap: 24px;
    padding-bottom: 16px;
  }
  .title-block .kicker {
    font-family: 'Archivo', sans-serif;
    font-weight: 900;
    font-size: 13px;
    letter-spacing: 0.18em;
    color: rgba(0,0,0,0.55);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .title-block h1 {
    font-family: 'Black Han Sans', sans-serif;
    font-size: clamp(72px, 11vw, 160px);
    line-height: 0.86;
    color: var(--ink);
    letter-spacing: -0.02em;
  }
  .title-block .sub-en {
    display: block;
    font-family: 'Archivo Black', sans-serif;
    font-size: clamp(54px, 8vw, 116px);
    line-height: 0.9;
    margin-top: 2px;
    letter-spacing: -0.01em;
    color: var(--ink);
  }
  .right-block { text-align: right; padding-bottom: 12px; }
  .right-block .serif {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 700;
    font-size: clamp(36px, 5vw, 64px);
    line-height: 0.95;
    color: var(--ink);
    white-space: pre-line;
  }
  .right-block .tag {
    margin-top: 10px;
    font-family: 'Pretendard', sans-serif;
    font-weight: 500;
    font-size: 14px;
    color: rgba(0,0,0,0.7);
    letter-spacing: -0.01em;
  }

  /* ───────── 월 이동 바 ───────── */
  .nav-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    padding: 8px 0;
    border-top: 2px solid var(--ink);
    border-bottom: 2px solid var(--ink);
  }
  .nav-btn {
    font-family: 'Archivo Black', sans-serif;
    font-size: 14px;
    letter-spacing: 0.08em;
    padding: 8px 16px;
    background: var(--ink);
    color: #fff;
    border: none;
    cursor: pointer;
    transition: opacity .15s;
  }
  .nav-btn:hover { opacity: 0.78; }
  .nav-btn:disabled {
    background: transparent;
    color: rgba(0,0,0,0.25);
    cursor: not-allowed;
  }
  .nav-current {
    font-family: 'Archivo Black', sans-serif;
    font-size: 15px;
    letter-spacing: 0.1em;
    color: var(--ink);
  }

  /* ───────── 요일 헤더 ───────── */
  .dow {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
    margin-bottom: 8px;
  }
  .dow > div {
    font-family: 'Archivo Black', sans-serif;
    font-size: 18px;
    letter-spacing: 0.05em;
    padding: 8px 14px;
    color: var(--ink);
  }
  .dow > div.sun { color: #FFFFFF; }
  .dow > div.sat { color: rgba(0,0,0,0.55); }

  /* ───────── 캘린더 그리드 ───────── */
  .grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
  }
  .cell {
    background: var(--cell);
    min-height: 150px;
    padding: 12px 13px 13px;
    position: relative;
    display: flex;
    flex-direction: column;
    gap: 6px;
    font-family: 'Pretendard', sans-serif;
  }
  .cell.outside {
    background: rgba(255,255,255,0.18);
    min-height: 150px;
  }
  .cell.outside .date { color: var(--outside); }
  .cell .date {
    font-family: 'Archivo Black', sans-serif;
    font-size: 22px;
    line-height: 1;
    color: var(--ink);
    margin-bottom: 2px;
  }
  .cell .date.sun-date { color: #E0381A; }

  /* 오늘 강조 */
  .cell.today { outline: 3px solid var(--ink); outline-offset: -3px; }
  .cell.today .date::after {
    content: 'TODAY';
    display: inline-block;
    margin-left: 8px;
    font-family: 'Archivo Black', sans-serif;
    font-size: 9px;
    letter-spacing: 0.1em;
    padding: 3px 6px 4px;
    background: var(--bg);
    color: #fff;
    vertical-align: middle;
  }

  /* 카테고리 바 */
  .bar {
    display: inline-block;
    padding: 3px 8px 4px;
    font-family: 'Pretendard', sans-serif;
    font-weight: 700;
    font-size: 11.5px;
    line-height: 1.1;
    color: #FFFFFF;
    letter-spacing: -0.01em;
    width: fit-content;
    max-width: 100%;
  }
  .bar.han { background: var(--c-han); }
  .bar.pro { background: var(--c-pro); }
  .bar.event { background: var(--c-event); }
  .bar.back { background: var(--c-back); color: #FFFFFF; }
  .bar.grade { background: var(--c-grade); color: #161616; }
  .bar.yoomini { background: var(--c-yoomini); }
  .bar.notice { background: var(--c-notice); }
  .bar.off { background: var(--c-off); }

  .cell .item-title {
    font-weight: 700;
    font-size: 12.5px;
    line-height: 1.3;
    color: var(--ink);
    letter-spacing: -0.015em;
    margin-top: 1px;
  }
  .cell .item-sub {
    font-size: 11px;
    line-height: 1.25;
    color: var(--soft);
    letter-spacing: -0.01em;
  }
  .cell .item + .item {
    margin-top: 4px;
    padding-top: 6px;
    border-top: 1px dashed rgba(0,0,0,0.12);
  }
  .item {
    display: flex;
    flex-direction: column;
    gap: 2px;
    cursor: pointer;
    transition: transform .12s;
  }
  .item:hover { transform: translateX(2px); }

  /* OFF 셀 */
  .cell.off-day {
    background: #161616;
    color: #FFFFFF;
  }
  .cell.off-day .date { color: #FFFFFF; }
  .cell.off-day .off-name {
    margin-top: auto;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 700;
    font-size: 22px;
    line-height: 1;
    color: var(--bg);
  }
  .cell.off-day .off-en {
    font-family: 'Archivo Black', sans-serif;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: rgba(255,255,255,0.45);
    margin-top: 4px;
  }

  /* feature 강조 셀 */
  .cell.feature { background: var(--ink); color: #FFFFFF; }
  .cell.feature .date { color: #FFFFFF; }
  .cell.feature .item-title { color: #FFFFFF; }
  .cell.feature .item-sub { color: rgba(255,255,255,0.7); }
  .cell.feature .bar.event { background: var(--bg); color: var(--ink); }
  .cell.feature.today { outline-color: #fff; }

  /* ───────── 푸터 ───────── */
  .footer {
    margin-top: 28px;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 20px;
  }
  .footer .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 6px 4px;
    font-family: 'Pretendard', sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: #FFFFFF;
  }
  .footer .legend .swatch {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 8px 4px;
    color: #FFFFFF;
  }
  .footer .legend .swatch.grade { color: #161616; }
  .footer .handle {
    font-family: 'Archivo Black', sans-serif;
    font-size: 14px;
    letter-spacing: 0.12em;
    color: var(--ink);
    text-align: center;
  }
  .footer .credit {
    font-family: 'Pretendard', sans-serif;
    font-size: 11px;
    color: rgba(0,0,0,0.55);
    font-weight: 500;
    text-align: right;
    letter-spacing: -0.01em;
  }

  /* ───────── 로딩/에러 ───────── */
  .state-banner {
    padding: 18px;
    background: rgba(0,0,0,0.08);
    text-align: center;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 12px;
  }
  .state-banner.error { background: #161616; color: #fff; }

  /* ───────── 모달 ───────── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: 24px;
    animation: fadeIn .18s ease;
  }
  .modal-overlay.open { display: flex; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .modal {
    background: #FFFFFF;
    max-width: 600px;
    width: 100%;
    max-height: 88vh;
    overflow-y: auto;
    position: relative;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    animation: slideUp .22s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .modal-close {
    position: absolute;
    top: 14px;
    right: 14px;
    width: 36px;
    height: 36px;
    background: var(--ink);
    color: #fff;
    border: none;
    font-size: 18px;
    cursor: pointer;
    font-family: 'Archivo Black', sans-serif;
    z-index: 2;
  }

  .modal-header {
    padding: 28px 28px 18px;
    border-bottom: 2px solid var(--ink);
  }
  .modal-date {
    font-family: 'Archivo Black', sans-serif;
    font-size: 14px;
    letter-spacing: 0.1em;
    color: var(--soft);
    margin-bottom: 10px;
  }
  .modal-bar { margin-bottom: 12px; }
  .modal-title {
    font-family: 'Pretendard', sans-serif;
    font-weight: 900;
    font-size: 24px;
    line-height: 1.25;
    color: var(--ink);
    letter-spacing: -0.02em;
  }
  .modal-subtitle {
    margin-top: 6px;
    font-size: 14px;
    color: var(--soft);
    font-weight: 500;
  }

  .modal-image {
    width: 100%;
    height: auto;
    display: block;
  }

  .modal-meta {
    display: grid;
    grid-template-columns: 80px 1fr;
    gap: 8px 14px;
    padding: 18px 28px;
    border-bottom: 1px dashed rgba(0,0,0,0.12);
    font-size: 13px;
  }
  .modal-meta dt {
    font-family: 'Archivo Black', sans-serif;
    font-size: 11px;
    letter-spacing: 0.08em;
    color: var(--soft);
    padding-top: 2px;
  }
  .modal-meta dd { color: var(--ink); font-weight: 500; }

  .modal-body {
    padding: 22px 28px;
    font-size: 14.5px;
    line-height: 1.7;
    color: var(--ink);
    white-space: pre-wrap;
  }
  .modal-body:empty { display: none; }

  .modal-link-wrap { padding: 0 28px 28px; }
  .modal-link {
    display: inline-block;
    padding: 12px 22px;
    background: var(--bg);
    color: var(--ink);
    text-decoration: none;
    font-weight: 700;
    font-size: 14px;
    transition: opacity .15s;
  }
  .modal-link:hover { opacity: 0.85; }

  /* 인쇄 */
  @media print {
    body { padding: 20px; }
    .cell { break-inside: avoid; }
    .nav-bar, .modal-overlay { display: none !important; }
  }

  /* 좁은 화면 */
  @media (max-width: 1100px) {
    body { padding: 24px 16px; }
    .cell { min-height: 110px; padding: 8px; }
    .cell .item-title { font-size: 11px; }
    .cell .item-sub { font-size: 10px; }
    .bar { font-size: 10px; padding: 2px 6px 3px; }
    .modal-meta { grid-template-columns: 70px 1fr; padding: 14px 20px; }
    .modal-header, .modal-body, .modal-link-wrap { padding-left: 20px; padding-right: 20px; }
  }
</style>
</head>
<body>

<div class="frame">

  <!-- HEADER -->
  <div class="header">
    <div class="title-block">
      <div class="kicker">CLUB HAWAII · MONTHLY CONTENT MAP</div>
      <h1>클럽하와이</h1>
      <span class="sub-en" id="hd-en">—</span>
    </div>
    <div class="right-block">
      <div class="serif" id="hd-serif">—</div>
      <div class="tag" id="hd-tag">—</div>
    </div>
  </div>

  <!-- 월 이동 -->
  <div class="nav-bar">
    <button class="nav-btn" id="prev-btn">‹ 이전 달</button>
    <div class="nav-current" id="nav-current">—</div>
    <button class="nav-btn" id="next-btn">다음 달 ›</button>
  </div>

  <!-- 상태 배너 (로딩/에러) -->
  <div class="state-banner" id="banner">데이터를 불러오는 중…</div>

  <!-- DOW -->
  <div class="dow">
    <div class="sun">SUN</div>
    <div>MON</div>
    <div>TUE</div>
    <div>WED</div>
    <div>THU</div>
    <div>FRI</div>
    <div class="sat">SAT</div>
  </div>

  <!-- GRID (동적 렌더링) -->
  <div class="grid" id="grid"></div>

  <!-- FOOTER -->
  <div class="footer">
    <div class="legend">
      <span class="swatch" style="background:var(--c-han)">한입에쏙</span>
      <span class="swatch" style="background:var(--c-pro)">전문성의 격</span>
      <span class="swatch" style="background:var(--c-event)">이벤트</span>
      <span class="swatch" style="background:var(--c-back)">다시,발견</span>
      <span class="swatch grade" style="background:var(--c-grade)">우리 학년 집중</span>
      <span class="swatch" style="background:var(--c-notice)">공지</span>
    </div>
    <div class="handle">@CLUB·HAWAII</div>
    <div class="credit">CLUB HAWAII · planned by 박현숙</div>
  </div>

</div>

<!-- ───────── 모달 ───────── -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" role="dialog" aria-modal="true">
    <button class="modal-close" id="modal-close" aria-label="닫기">✕</button>
    <div class="modal-header">
      <div class="modal-date" id="m-date">—</div>
      <span class="bar modal-bar" id="m-bar">—</span>
      <div class="modal-title" id="m-title">—</div>
      <div class="modal-subtitle" id="m-subtitle"></div>
    </div>
    <img class="modal-image" id="m-image" alt="" style="display:none;">
    <dl class="modal-meta" id="m-meta"></dl>
    <div class="modal-body" id="m-body"></div>
    <div class="modal-link-wrap" id="m-linkwrap" style="display:none;">
      <a class="modal-link" id="m-link" href="#" target="_blank" rel="noopener">자세히 보기 →</a>
    </div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════
 *  설정 — 여기 URL만 바꾸면 끝
 *  Apps Script [배포 → 웹 앱]에서 발급된 URL 붙여넣기
 * ═══════════════════════════════════════════════════ */
const SHEET_API_URL = 'https://script.google.com/macros/s/AKfycby3f67OMNtcDBZAP2U-FYeT_TtXzR9lnGaKUEZ3UpZsNdBDstJuWkQjpZPW71_OqzV3cQ/exec';

/* ─────────────── 상수 ─────────────── */
const MONTHS_EN = ['JANUARY','FEBRUARY','MARCH','APRIL','MAY','JUNE','JULY','AUGUST','SEPTEMBER','OCTOBER','NOVEMBER','DECEMBER'];
const CATEGORY_LABELS = {
  han: '한입에쏙',
  pro: '전문성의 격',
  event: '이벤트',
  back: '다시,발견',
  grade: '우리 학년 집중',
  yoomini: '유미니',
  notice: '공지',
  off: 'OFF'
};

/* ─────────────── 상태 ─────────────── */
const today = new Date();
const todayY = today.getFullYear();
const todayM = today.getMonth(); // 0~11
let viewY = todayY;
let viewM = todayM;
let DATA = null; // { contents, holidays, month_meta }

/* ─────────────── 유틸 ─────────────── */
function ymd(y, m, d) {
  return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}
function parseYMD(s) {
  if (!s) return null;
  const [y, m, d] = String(s).slice(0,10).split('-').map(Number);
  return { y, m: m-1, d };
}
function daysInMonth(y, m) { return new Date(y, m+1, 0).getDate(); }
function escapeHTML(s) {
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

/* ─────────────── 데이터 로드 ─────────────── */
async function loadData() {
  const banner = document.getElementById('banner');
  try {
    if (!SHEET_API_URL || SHEET_API_URL.includes('여기에_본인')) {
      throw new Error('SHEET_API_URL이 아직 설정되지 않았습니다. index.html 상단 SHEET_API_URL 변수에 Apps Script 웹앱 URL을 넣어주세요.');
    }
    const res = await fetch(SHEET_API_URL);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const json = await res.json();
    if (json.error) throw new Error(json.error);
    DATA = json;
    banner.style.display = 'none';
    render();
  } catch (err) {
    banner.classList.add('error');
    banner.textContent = '데이터를 불러오지 못했습니다 — ' + err.message;
  }
}

/* ─────────────── 렌더링 ─────────────── */
function render() {
  if (!DATA) return;

  // 헤더 업데이트
  const monthKey = `${viewY}-${String(viewM+1).padStart(2,'0')}`;
  document.getElementById('hd-en').textContent = `${MONTHS_EN[viewM]} ${viewY}`;
  const meta = (DATA.month_meta || []).find(r => r.month === monthKey);
  document.getElementById('hd-serif').textContent = meta ? (meta.serif_copy || '') : '';
  document.getElementById('hd-tag').textContent   = meta ? (meta.tag_line || '') : '';
  document.getElementById('nav-current').textContent = `${viewY}년 ${viewM+1}월`;

  // 월 이동 버튼 가용 범위: 이번 달 ~ 다음 달
  const prevBtn = document.getElementById('prev-btn');
  const nextBtn = document.getElementById('next-btn');
  prevBtn.disabled = (viewY === todayY && viewM === todayM);
  const nextLimitDate = new Date(todayY, todayM+1, 1);
  const viewNextDate  = new Date(viewY, viewM+1, 1);
  nextBtn.disabled = (viewNextDate > nextLimitDate);

  // 콘텐츠/휴일 맵핑
  const dateMap = {};   // 'YYYY-MM-DD' → [contents...]
  (DATA.contents || []).forEach(r => {
    if (!r.date) return;
    if (!r.date.startsWith(monthKey)) return;
    (dateMap[r.date] = dateMap[r.date] || []).push(r);
  });
  const holidayMap = {};
  (DATA.holidays || []).forEach(r => {
    if (r.date && r.date.startsWith(monthKey)) holidayMap[r.date] = r;
  });

  // 그리드 빌드
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  const firstDow = new Date(viewY, viewM, 1).getDay(); // 0=Sun
  const dim = daysInMonth(viewY, viewM);
  const totalCells = Math.ceil((firstDow + dim) / 7) * 7;

  // 이전 달 outside
  const prevDim = daysInMonth(viewY, viewM-1);
  for (let i = 0; i < firstDow; i++) {
    const d = prevDim - firstDow + 1 + i;
    grid.appendChild(buildOutsideCell(d, i === 0));
  }

  // 이번 달
  const todayStr = ymd(todayY, todayM, today.getDate());
  for (let d = 1; d <= dim; d++) {
    const dateStr = ymd(viewY, viewM, d);
    const dow = (firstDow + d - 1) % 7;
    const isToday = (dateStr === todayStr);
    const isSun = (dow === 0);

    if (holidayMap[dateStr]) {
      grid.appendChild(buildOffCell(d, holidayMap[dateStr], isToday));
    } else {
      grid.appendChild(buildContentCell(d, dateStr, dateMap[dateStr] || [], isSun, isToday));
    }
  }

  // 다음 달 outside
  const used = firstDow + dim;
  const tailCount = totalCells - used;
  for (let i = 0; i < tailCount; i++) {
    grid.appendChild(buildOutsideCell(i+1, i === 0, true));
  }
}

function buildOutsideCell(d, withLabel, isNextMonth) {
  const cell = document.createElement('div');
  cell.className = 'cell outside';
  cell.innerHTML = `<div class="date">${d}</div>` +
    (withLabel ? `<div class="item-sub">— ${isNextMonth ? MONTHS_EN[(viewM+1)%12] : MONTHS_EN[(viewM+11)%12]} —</div>` : '');
  return cell;
}

function buildOffCell(d, holiday, isToday) {
  const cell = document.createElement('div');
  cell.className = 'cell off-day' + (isToday ? ' today' : '');
  cell.innerHTML = `
    <div class="date">${d}</div>
    <div class="off-name">${escapeHTML(holiday.name_ko)}</div>
    <div class="off-en">OFF · ${escapeHTML(holiday.name_en || '')}</div>
  `;
  return cell;
}

function buildContentCell(d, dateStr, items, isSun, isToday) {
  const hasFeature = items.some(it => it.is_feature);
  const cell = document.createElement('div');
  cell.className = 'cell' + (hasFeature ? ' feature' : '') + (isToday ? ' today' : '');

  const dateClass = isSun ? 'date sun-date' : 'date';
  let html = `<div class="${dateClass}">${d}</div>`;

  items.forEach((it, idx) => {
    const cat = it.category || '';
    const label = CATEGORY_LABELS[cat] || cat;
    html += `
      <div class="item" data-date="${dateStr}" data-idx="${idx}">
        <span class="bar ${escapeHTML(cat)}">${escapeHTML(label)}</span>
        <div class="item-title">${escapeHTML(it.title || '')}</div>
        ${it.subtitle ? `<div class="item-sub">${escapeHTML(it.subtitle)}</div>` : ''}
      </div>
    `;
  });

  cell.innerHTML = html;

  // 각 item에 클릭 핸들러
  cell.querySelectorAll('.item').forEach(el => {
    el.addEventListener('click', () => {
      const idx = parseInt(el.dataset.idx, 10);
      openModal(items[idx], dateStr);
    });
  });

  return cell;
}

/* ─────────────── 모달 ─────────────── */
function openModal(item, dateStr) {
  const cat = item.category || '';
  const label = CATEGORY_LABELS[cat] || cat;
  const { y, m, d } = parseYMD(dateStr);
  const dowLabel = ['SUN','MON','TUE','WED','THU','FRI','SAT'][new Date(y, m, d).getDay()];

  document.getElementById('m-date').textContent = `${y}.${String(m+1).padStart(2,'0')}.${String(d).padStart(2,'0')} · ${dowLabel}`;

  const bar = document.getElementById('m-bar');
  bar.className = 'bar modal-bar ' + cat;
  bar.textContent = label;

  document.getElementById('m-title').textContent = item.title || '';
  document.getElementById('m-subtitle').textContent = item.subtitle || '';

  // 이미지
  const img = document.getElementById('m-image');
  if (item.image_url) {
    img.src = item.image_url;
    img.style.display = 'block';
  } else {
    img.style.display = 'none';
    img.src = '';
  }

  // 메타 (담당자/시간)
  const meta = document.getElementById('m-meta');
  meta.innerHTML = '';
  let hasMeta = false;
  if (item.speaker) {
    meta.innerHTML += `<dt>담당</dt><dd>${escapeHTML(item.speaker)}</dd>`;
    hasMeta = true;
  }
  if (item.time) {
    meta.innerHTML += `<dt>시간</dt><dd>${escapeHTML(item.time)}</dd>`;
    hasMeta = true;
  }
  meta.style.display = hasMeta ? 'grid' : 'none';

  // 본문
  document.getElementById('m-body').textContent = item.detail_body || '';

  // 링크
  const linkWrap = document.getElementById('m-linkwrap');
  const link = document.getElementById('m-link');
  if (item.link_url) {
    link.href = item.link_url;
    linkWrap.style.display = 'block';
  } else {
    linkWrap.style.display = 'none';
  }

  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}
document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-overlay').addEventListener('click', (e) => {
  if (e.target.id === 'modal-overlay') closeModal();
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
});

/* ─────────────── 월 이동 ─────────────── */
document.getElementById('prev-btn').addEventListener('click', () => {
  if (viewY === todayY && viewM === todayM) return;
  viewM -= 1;
  if (viewM < 0) { viewM = 11; viewY -= 1; }
  render();
});
document.getElementById('next-btn').addEventListener('click', () => {
  const nextLimitDate = new Date(todayY, todayM+1, 1);
  const viewNextDate  = new Date(viewY, viewM+1, 1);
  if (viewNextDate > nextLimitDate) return;
  viewM += 1;
  if (viewM > 11) { viewM = 0; viewY += 1; }
  render();
});

/* ─────────────── 시작 ─────────────── */
loadData();
</script>
</body>
</html>
